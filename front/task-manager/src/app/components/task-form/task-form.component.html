<div class="form-card">
  <h3>{{ isEdit ? 'Edit Task' : 'Create New Task' }}</h3>

  <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
    <div class="field">
      <label>Title</label>
      <input formControlName="title" placeholder="Task title..." />
      <div class="error" *ngIf="taskForm.get('title')?.invalid && taskForm.get('title')?.touched">
        Title is required
      </div>
    </div>

    <div class="field">
      <label>Description</label>
      <textarea formControlName="description" placeholder="Add a description..."></textarea>
    </div>

    <div class="field">
      <label>Status</label>
      <!-- بعد (الكود الجديد) -->
<div class="status-options">
  <div *ngFor="let s of statuses"
       class="status-opt"
       [class.selected-todo]="taskForm.get('status')?.value == s.value && s.key === 'todo'"
       [class.selected-prog]="taskForm.get('status')?.value == s.value && s.key === 'prog'"
       [class.selected-done]="taskForm.get('status')?.value == s.value && s.key === 'done'"
       (click)="taskForm.get('status')?.setValue(s.value)">
    <span class="dot" [style.background]="s.color"></span>
    {{ s.label }}
  </div>
</div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" routerLink="/tasks">Cancel</button>
      <button type="submit" class="btn-submit" [disabled]="isLoading">
        {{ isLoading ? 'Saving...' : (isEdit ? 'Update Task' : 'Create Task') }}
      </button>
    </div>
  </form>
</div>
